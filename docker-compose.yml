services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: navigation-site-backend
    restart: unless-stopped
    expose:
      - "8002"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/navigation.db
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST:-smtp.163.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:20261}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:20261}
    networks:
      - navigation-site-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: navigation-site-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-20261}:80"
    depends_on:
      - backend
    networks:
      - navigation-site-network

networks:
  navigation-site-network:
    driver: bridge
